<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keilah -- Sandbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0f0f;color:#e8e4dc;font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;padding:48px 24px 80px}
  .container{max-width:820px;margin:0 auto}

  .label{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#6b6b6b;margin-bottom:8px}

  .subtitle{color:#6b6b6b;font-size:14px;font-weight:300}
  .content{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;padding:32px;min-height:200px}
  .content p{color:#a0a0a0;font-size:14px;font-weight:300}
  .back-link{display:inline-block;margin-top:32px;color:#6b6b6b;font-size:13px;text-decoration:none;border-bottom:1px solid #2e2e2e;padding-bottom:2px;transition:all 0.15s}

<body>
