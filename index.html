<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keilah -- AI Strategy Session</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--text:#e8e4dc;--muted:#6b6b6b;--action:#4ade80;--dig:#60a5fa;--revisit:#fbbf24;--skip:#525252;--action-bg:rgba(74,222,128,0.08);--dig-bg:rgba(96,165,250,0.08);--revisit-bg:rgba(251,191,36,0.08);--skip-bg:rgba(82,82,82,0.08);--context:#a78bfa}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;padding:48px 24px 80px}
  .container{max-width:820px;margin:0 auto}
  header{border-bottom:1px solid var(--border);padding-bottom:28px;margin-bottom:40px}
  .label{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  h1{font-family:'DM Serif Display',serif;font-size:38px;font-weight:400;line-height:1.1;margin-bottom:10px}
  .subtitle{color:var(--muted);font-size:14px;font-weight:300}
  .legend{display:flex;flex-wrap:wrap;gap:16px;margin:28px 0 40px;padding:16px 20px;background:var(--surface);border-radius:10px;border:1px solid var(--border)}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .section-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin:40px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;transition:border-color 0.2s,background 0.2s;position:relative;overflow:hidden}
  .card.status-action{border-color:var(--action);background:var(--action-bg)}
  .card.status-dig{border-color:var(--dig);background:var(--dig-bg)}
  .card.status-revisit{border-color:var(--revisit);background:var(--revisit-bg)}
  .card.status-skip{border-color:var(--skip);background:var(--skip-bg);opacity:0.55}
  .card-header{padding:22px 24px;cursor:pointer;user-select:none}
  .card-header:hover{background:rgba(255,255,255,0.02)}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:6px}
  .card-title-row{display:flex;align-items:center;gap:10px;flex:1}
  .card-title{font-family:'DM Serif Display',serif;font-size:19px;font-weight:400;line-height:1.25}
  .expand-icon{color:var(--muted);font-size:12px;transition:transform 0.25s ease;flex-shrink:0;margin-top:6px;width:20px;text-align:center}
  .card.expanded .expand-icon{transform:rotate(90deg)}
  .star{color:var(--revisit);font-size:13px;flex-shrink:0;margin-top:4px}
  .card-summary{font-size:13.5px;color:#a0a0a0;font-weight:300;line-height:1.55}
  .card-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
  .card.expanded .card-body{max-height:2000px}
  .card-body-inner{padding:0 24px 22px;border-top:1px solid var(--border);padding-top:20px}
  .detail-section{margin-bottom:18px}
  .detail-section:last-of-type{margin-bottom:20px}
  .detail-label{font-size:10.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .detail-text{font-size:14px;color:#c0bdb5;font-weight:300;line-height:1.65}
  .detail-text strong{color:var(--text);font-weight:500}
  .context-box{background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:8px;padding:14px 16px;margin-top:4px}
  .context-box .detail-label{color:var(--context)}
  .tool-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  .tool-table th{text-align:left;font-size:10.5px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:6px 10px 6px 0;border-bottom:1px solid var(--border)}
  .tool-table td{padding:8px 10px 8px 0;color:#b0ada5;font-weight:300;border-bottom:1px solid rgba(46,46,46,0.5);vertical-align:top}
  .tool-table td strong{color:var(--text);font-weight:500}
  .tool-table tr:last-child td{border-bottom:none}
  .talking-points{list-style:none;padding:0;margin-top:6px}
  .talking-points li{position:relative;padding-left:16px;margin-bottom:8px;font-size:13.5px;color:#b0ada5;font-weight:300;line-height:1.5}
  .talking-points li::before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--muted)}
  .status-buttons{display:flex;flex-wrap:wrap;gap:8px;padding:0 24px 20px}
  .btn{border:none;border-radius:6px;padding:6px 14px;font-size:12.5px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;background:var(--surface2);color:var(--muted);letter-spacing:0.01em}
  .btn:hover{filter:brightness(1.3);color:var(--text)}
  .btn.active-action{background:var(--action);color:#000}
  .btn.active-dig{background:var(--dig);color:#000}
  .btn.active-revisit{background:var(--revisit);color:#000}
  .btn.active-skip{background:var(--skip);color:var(--text)}
  .btn-undo{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 10px;margin-left:4px}
  .btn-undo:hover{color:var(--text);border-color:#555}
  .summary{margin-top:56px;border-top:1px solid var(--border);padding-top:32px}
  .summary h2{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;margin-bottom:20px}
  .summary-group{margin-bottom:24px}
  .summary-group-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .summary-group-label .dot{width:8px;height:8px}
  .summary-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;color:#c0bdb5}
  .summary-item:last-child{border-bottom:none}
  .empty-state{color:var(--muted);font-size:13px;font-style:italic}
  .summary-actions{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap}
  .clear-btn,.email-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 16px;border-radius:6px;cursor:pointer;transition:all 0.15s}
  .clear-btn:hover,.email-btn:hover{color:var(--text);border-color:#555}
  .email-btn{border-color:var(--action);color:var(--action)}
  .email-btn:hover{background:var(--action);color:#000}
  .btn-notes{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 10px;margin-left:auto}
  .btn-notes:hover{color:var(--text);border-color:#555}
  .btn-notes.has-notes{border-color:var(--dig);color:var(--dig)}
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:560px;padding:28px;position:relative}
  .modal-title{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:6px}
  .modal-subtitle{font-size:13px;color:var(--muted);font-weight:300;margin-bottom:20px}
  .modal textarea{width:100%;min-height:160px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;padding:14px;resize:vertical;outline:none}
  .modal textarea:focus{border-color:var(--dig)}
  .modal textarea::placeholder{color:var(--muted)}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
  .modal-btn{border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s}
  .modal-btn-cancel{background:var(--surface2);color:var(--muted)}
  .modal-btn-cancel:hover{color:var(--text)}
  .modal-btn-save{background:var(--dig);color:#000}
  .modal-btn-save:hover{filter:brightness(1.1)}
  .note-preview{font-size:12px;color:var(--dig);padding:4px 24px 0;font-style:italic;font-weight:300}
  .summary-note{font-size:12.5px;color:var(--dig);font-style:italic;font-weight:300;padding:2px 0 4px;margin-left:4px}
  .saved-indicator{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);color:var(--action);font-size:12px;padding:8px 14px;border-radius:8px;opacity:0;transition:opacity 0.3s;pointer-events:none}
  .saved-indicator.show{opacity:1}
  @media(max-width:600px){h1{font-size:28px}.card-header{padding:18px}.card-body-inner{padding:0 18px 18px}.status-buttons{padding:0 18px 16px}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="label">AI Strategy Session</div>
    <h1>Keilah</h1>
    <div class="subtitle" id="date-display"></div>
  </header>
  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:var(--action)"></div> Action Item -- doing this</div>
    <div class="legend-item"><div class="dot" style="background:var(--dig)"></div> Dig Deeper -- explore today</div>
    <div class="legend-item"><div class="dot" style="background:var(--revisit)"></div> Revisit Later -- future session</div>
    <div class="legend-item"><div class="dot" style="background:var(--skip)"></div> Not Relevant -- skip for now</div>
  </div>
  <div id="cards-container"></div>
  <div class="summary" id="summary">
    <h2>Session Summary</h2>
    <div id="summary-content"></div>
    <div class="summary-actions">
      <button class="email-btn" onclick="emailSummary()">Email Summary</button>
      <button class="email-btn" onclick="copySummary()" id="copy-btn">Copy Summary to Clipboard</button>
      <button class="clear-btn" onclick="clearAll()">Reset all selections</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="notes-modal" onclick="closeNotesModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle">These notes will be included in the session summary.</div>
    <textarea id="modal-textarea" placeholder="Type your notes here..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeNotesModal()">Cancel</button>
      <button class="modal-btn modal-btn-save" onclick="saveNotes()">Save Notes</button>
    </div>
  </div>
</div>
<div class="saved-indicator" id="saved-indicator">Saved</div>
<script>
const STORAGE_KEY='keilah_session_v2';
const topics=[{"id": "slide-deck", "section": "Core Topics", "title": "Weekly Staff Update Slide Deck", "star": true, "summary": "Your idea. Right now you're building slides one prompt at a time in ChatGPT and pasting them into Google Slides. We can turn that into a one-click workflow.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">You manage communication across 3 to 5 offices where staff rarely (or never) meet each other face to face. Every week, you need to get everyone on the same page -- new policies, schedule changes, reminders, wins, whatever is going on. Right now, you're doing that by prompting ChatGPT one slide at a time, then manually pasting each one into Google Slides. That works, but it's slow and tedious for something you do every single week.<br><br>The goal here is to build a workflow where you <strong>jot down notes throughout the week</strong> (in whatever way is easiest for you -- a doc, a note on your phone, voice memos) and then at the end of the week, you feed all of that into one tool and get a <strong>complete, designed slide deck back in seconds</strong>. No more one-slide-at-a-time prompting. No more copy-paste assembly.</div></div><div class=\"detail-section\"><div class=\"detail-label\">Tool Options</div><table class=\"tool-table\"><tr><th>Tool</th><th>How It Works</th><th>Cost</th><th>Effort</th></tr><tr><td><strong>Gamma.app</strong></td><td>Paste your weekly notes in, pick a style, and it generates a fully designed slide deck you can share as a link or download</td><td>Free to $15/mo</td><td>Very low</td></tr><tr><td><strong>NotebookLM</strong></td><td>Add notes throughout the week into a notebook, then ask it to generate a summary or slide outline from everything you've collected</td><td>Free</td><td>Low</td></tr><tr><td><strong>Claude for Desktop</strong></td><td>Paste all your notes at once with a custom prompt that formats them into a slide outline. You control the structure and tone</td><td>Free to $20/mo</td><td>Low to Medium</td></tr><tr><td><strong>Google Slides + Claude</strong></td><td>Claude writes all the content and bullet points, you paste them into your existing Slides template</td><td>Free</td><td>Low</td></tr></table></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">This is your idea and the reason we're talking today. You mentioned you're already doing this workflow manually with ChatGPT and Google Slides, so you already know it's valuable -- we just need to make it faster. This is the anchor for the whole session.</div></div>"}, {"id": "claude-desktop", "section": "Core Topics", "title": "Claude for Desktop", "star": false, "summary": "A desktop AI assistant that lives on your computer. More capable than ChatGPT for longer tasks, and you can customize it to think like your role.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">Claude is an AI assistant made by Anthropic (a different company than OpenAI, which makes ChatGPT). The desktop app sits right on your computer so you can pull it up anytime -- no browser tab to dig for. You can paste in text, ask it questions, have it draft things for you, or even give it a <strong>system prompt</strong> that tells it who you are and how you like things written.<br><br>For example, you could set it up so every time you open it, it already knows you're an office manager overseeing multiple locations, that you write weekly staff updates, and that you prefer a professional but friendly tone. That context makes every response better from the first word, instead of re-explaining yourself every time you start a new chat.</div></div><div class=\"detail-section\"><div class=\"detail-label\">What We'd Do Today</div><ul class=\"talking-points\"><li>Quick tour of the interface if you've already installed it (or walk through the install together if not)</li><li>Set up a system prompt tailored to your role so it's ready to help immediately</li><li>Try 2 to 3 real tasks -- drafting an email, summarizing notes, formatting a quick update</li><li>Talk about when to use Claude vs. ChatGPT (they have different strengths)</li></ul></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">You're already using ChatGPT, which means you're comfortable with AI tools. Claude tends to be stronger for longer writing tasks, following detailed instructions, and working within a specific voice or format -- all things that matter for your weekly updates and office communications. Worth seeing if it clicks better for your workflow.</div></div>"}, {"id": "notebooklm", "section": "Core Topics", "title": "NotebookLM as a Weekly Brain Dump", "star": false, "summary": "Google's AI notebook tool. You add notes, docs, and links throughout the week, and it organizes everything and can generate summaries, FAQs, or outlines on demand.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">NotebookLM is a free tool from Google that acts like a smart notebook. You throw things into it throughout the week -- notes, documents, links, PDFs, whatever you want -- and it reads and understands all of it. Then you can ask it questions about what you've added, or have it generate summaries, outlines, briefing docs, or even audio overviews.<br><br>For your workflow, this could be powerful: instead of saving up notes and then sitting down to build a slide deck from scratch, you <strong>add notes as things happen during the week</strong>. By Friday, your notebook already has everything in it. You ask it to generate a staff update summary, and it pulls from everything you've added. That summary can go straight into Gamma or Google Slides.</div></div><div class=\"detail-section\"><div class=\"detail-label\">Key Features</div><ul class=\"talking-points\"><li>Upload PDFs, Google Docs, web links, or paste raw text as sources</li><li>Ask questions across all your sources at once (What were the main changes this week?)</li><li>Generate structured outputs like summaries, FAQs, study guides, or timelines</li><li>Audio overview feature can turn your notes into a podcast-style summary</li><li>Free to use with a Google account</li></ul></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">The slide deck problem isn't just about making slides -- it's about collecting and organizing information across a busy week at multiple offices. NotebookLM solves the collection side. Instead of trying to remember everything on Friday, you have a running record that AI can summarize for you. It pairs naturally with the slide deck workflow as the input side of the equation.</div></div>"}, {"id": "gamma", "section": "Core Topics", "title": "Gamma.app -- Instant Slide Decks", "star": false, "summary": "Paste in a rough summary or bullet points and Gamma generates a fully designed, shareable slide deck in seconds. Lowest learning curve of any option.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">Gamma is a web-based presentation tool that uses AI to turn rough text into polished, designed slide decks. You paste in your bullet points, notes, or even a paragraph of text, pick a visual style, and it generates a complete deck with layout, typography, and structure already handled. No dragging boxes around, no fighting with formatting.<br><br>The output looks professional out of the box and you can share it as a <strong>live web link</strong> (no downloading files and emailing attachments). Staff at any office can just click the link and see the latest update. You can also download as PDF or PowerPoint if you prefer.</div></div><div class=\"detail-section\"><div class=\"detail-label\">Why This Might Be the Fastest Win</div><div class=\"detail-text\">Of all the tools on this list, Gamma has the <strong>lowest barrier to entry</strong>. There is almost no learning curve. If you can paste text into a box, you can use Gamma. The free tier gives you enough to try it, and the paid tier ($15/month) removes the Gamma branding and gives you more design options. You could realistically walk out of this session with a completed slide deck for next week.</div></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">Your current pain point is the manual assembly in Google Slides. Gamma eliminates that step entirely. It's the most direct solution to the specific problem you described -- getting from rough notes to a finished, shareable deck without spending an hour on formatting. If we only implement one thing today, this is probably the one that delivers the most visible result.</div></div>"}, {"id": "comms-hub", "section": "Core Topics", "title": "Cross-Office Communication Hub", "star": false, "summary": "You're the human relay between offices right now. There might be a system that lets information flow without everything going through you personally.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">Right now, you're the connective tissue between 3 to 5 offices. When something changes at one location, you're the one who carries that information to the others -- whether by email, phone, in person, or through the weekly slide deck. That means you're a bottleneck (not because you're slow, but because <strong>every piece of information has to pass through one person</strong>).<br><br>A communication hub could be as simple as a shared Google Doc that you update weekly, or as structured as a dedicated page or channel where updates are posted and everyone can check them on their own time. The idea isn't to add another tool to manage -- it's to find a system where information reaches people <strong>without you having to deliver it individually every time</strong>.</div></div><div class=\"detail-section\"><div class=\"detail-label\">Options Worth Discussing</div><ul class=\"talking-points\"><li>A shared Google Doc or Notion page that serves as a living office bulletin board</li><li>A simple group chat (Google Chat, Slack) where updates go and anyone can scroll back</li><li>A weekly email digest auto-generated from your notes (Claude or NotebookLM could write it)</li><li>The slide deck itself, shared as a Gamma link, could become the hub if everyone checks it</li></ul></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">The slide deck is one form of cross-office communication, but it's weekly. Day-to-day, you're still the relay. When you mentioned managing multiple offices with staff who don't meet each other, it signaled that the communication problem is bigger than just slides. This one might not be something we solve today, but it's worth understanding how information moves between your offices so we know where the real friction is.</div></div>"}, {"id": "prompt-library", "section": "Core Topics", "title": "Personal Prompt Library", "star": false, "summary": "A collection of reusable AI prompts for your most common tasks -- emails, updates, summaries. Copy, tweak, send. No starting from scratch each time.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">When you use ChatGPT or Claude, you probably find yourself typing similar instructions over and over. Every time, you're re-explaining what you need and how you want it.<br><br>A prompt library is a <strong>saved collection of your best prompts</strong> -- the ones that consistently give you good results. Instead of typing from scratch, you open the prompt, paste in your specific details, and go. Think of it like email templates, but for AI. You could have prompts for weekly update drafts, staff emails, meeting notes, policy explanations, or anything else you write regularly.</div></div><div class=\"detail-section\"><div class=\"detail-label\">Example Prompts You Might Build</div><ul class=\"talking-points\"><li>Here are my notes from this week. Write a friendly but professional staff update covering each topic in 2 to 3 sentences. Tone: warm, clear, no jargon.</li><li>Draft a short email to [name] about [topic]. Keep it under 4 sentences. Professional but not stiff.</li><li>I just finished a meeting. Here are my raw notes. Turn these into a clean summary with action items at the bottom.</li><li>Explain this policy change to staff who might be confused or resistant. Be empathetic but clear.</li></ul></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">You're already using ChatGPT, which means you're already prompting. But you're probably re-inventing the wheel each time you start a new chat. Once we identify the 3 to 5 things you write most often, we can build prompts that give you a head start every time. This isn't a new tool -- it's making the tools you already use work harder for you.</div></div>"}, {"id": "voice-to-update", "section": "Core Topics", "title": "Voice Memo to Written Update", "star": false, "summary": "Record a quick voice note while driving between offices, and it gets transcribed and formatted into a written update automatically.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">You travel between offices. That means time in the car where your brain is processing everything you just saw, heard, or need to communicate -- but you can't type while driving. By the time you sit down again, half of those thoughts are gone or buried under the next office's problems.<br><br>Voice-to-text solves this. You <strong>record a quick voice memo</strong> while it's fresh -- 30 seconds to 2 minutes, just talking naturally about what happened. That audio gets transcribed automatically, and then AI can clean it up, format it as a staff update, or add it to your weekly notes. The raw material for your slide deck gets captured in real time, without you ever sitting down to type.</div></div><div class=\"detail-section\"><div class=\"detail-label\">How It Could Work</div><ul class=\"talking-points\"><li><strong>iPhone Voice Memos + transcription:</strong> Record on your phone, transcription is built in on newer iOS. Copy the text into your notes or NotebookLM</li><li><strong>Otter.ai:</strong> Records and transcribes in real time, highlights key points, free tier available</li><li><strong>Claude for Desktop (mobile coming):</strong> Paste the transcript and ask it to format as a staff update or extract action items</li><li><strong>Google Keep voice notes:</strong> Quick capture that syncs across devices, auto-transcribes, searchable</li></ul></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">When you described traveling between offices, it became clear that a lot of your information capture happens on the move. If we can solve the I had a great thought in the car and forgot it by the time I sat down problem, that feeds directly into the slide deck workflow, the communication hub, and pretty much everything else. This is about capturing input at the moment it happens.</div></div>"}, {"id": "daily-writing", "section": "Core Topics", "title": "Daily Writing and Drafting Tasks", "star": false, "summary": "Identifying the emails, memos, and messages you write repeatedly so AI can draft them in seconds instead of minutes.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">Beyond the weekly slide deck, you probably write a lot of smaller things every day -- emails to staff, messages to the owner, follow-ups after meetings, reminders, policy explanations, scheduling communications. Each one might only take 5 to 10 minutes, but they add up fast across a week.<br><br>The goal here is to <strong>identify your top 3 to 5 most repetitive writing tasks</strong> and figure out which ones AI can draft for you. Not replace your judgment -- you still review and send everything. But instead of staring at a blank email for 5 minutes figuring out how to word something, you get a solid first draft in 10 seconds and just tweak it.</div></div><div class=\"detail-section\"><div class=\"detail-label\">Common Examples in Office Management</div><ul class=\"talking-points\"><li>Staff emails about schedule changes, policy updates, or reminders</li><li>Updates to the practice owner summarizing the week or flagging issues</li><li>Follow-up messages after meetings or phone calls</li><li>Responses to common questions from staff across offices</li><li>Onboarding information for new hires (same info, different person each time)</li></ul></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">The slide deck is a weekly task, but the daily time drain is usually in the small stuff. If you're writing 10 emails a day and AI can draft 6 of them, that's potentially an hour back every day. This is the discovery piece -- we won't know what your biggest daily writing bottlenecks are until we look at them together, but this is often where the biggest time savings hide.</div></div>"}, {"id": "discovery-week", "section": "Discovery", "title": "Walk Me Through a Typical Week", "star": false, "summary": "An open conversation about what your actual Monday-to-Friday looks like, so we can spot patterns and bottlenecks you might not even notice anymore.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">Sometimes the biggest opportunities aren't the ones you'd think to ask about. They're the tasks you do so automatically that you don't even register them as time-consuming anymore. Walking through a real week together -- what happens Monday morning, what you do when you arrive at each office, what falls on your plate by Friday -- often surfaces things that are obvious candidates for improvement once someone points them out.<br><br>This isn't a quiz or an audit. It's just <strong>a conversation about how your week actually works</strong> so we can see where AI tools (or even simpler changes) might save you the most time.</div></div><div class=\"detail-section\"><div class=\"detail-label\">Conversation Starters</div><ul class=\"talking-points\"><li>What's the first thing you do when you sit down on Monday morning?</li><li>When you arrive at a different office, what's the first thing you have to deal with?</li><li>Is there anything you end up re-explaining or re-typing every week?</li><li>What does the practice owner ask you for most often?</li><li>If we could wave a wand and remove one task from your week, what would it be?</li></ul></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">The slide deck is what brought us together, but it's probably not the only thing costing you time. This open-ended walkthrough is how we find the surprises -- the tasks that are so routine you've stopped questioning them, but that could be cut in half with the right approach. Even if nothing new comes up, it helps us understand the full picture so that anything we build today fits into your real workflow.</div></div>"}, {"id": "discovery-annoying", "section": "Discovery", "title": "What's the Most Annoying Recurring Task?", "star": false, "summary": "The one thing you dread or roll your eyes at every time it comes around. Usually the highest-value thing to fix first.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">Everyone has at least one task that makes them groan. It's not necessarily the hardest thing you do -- it might be something simple that's just tedious, repetitive, or feels like a waste of your time because you know it <strong>should</strong> be easier.<br><br>That groan is a signal. It usually points to the task where the gap between how long this takes and how long this should take is the widest. That gap is where AI tools have the most impact. The thing you hate doing is often the first thing that should be automated or streamlined.</div></div><div class=\"detail-section\"><div class=\"detail-label\">What We're Listening For</div><ul class=\"talking-points\"><li>Tasks that involve a lot of typing or retyping the same kind of information</li><li>Things you put off because they're boring, even though they're important</li><li>Anything that requires gathering info from multiple places before you can start</li><li>Communication tasks where you're essentially a messenger between two parties</li><li>Reporting or documentation that feels like busywork</li></ul></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">The answer to this question almost always reveals the highest-value automation opportunity. It's not about fixing everything -- it's about finding the one thing where improvement would feel the most meaningful to you personally. When you fix the thing that annoys you the most, it builds momentum and makes you want to tackle the next thing.</div></div>"}, {"id": "future-vision", "section": "Future", "title": "Where This Could Go", "star": false, "summary": "No pressure, just planting a seed. What you're building for yourself could eventually extend to the entire practice.", "detail": "<div class=\"detail-section\"><div class=\"detail-label\">What This Is</div><div class=\"detail-text\">Everything we're talking about today is focused on making <strong>your</strong> work easier. But it's worth knowing that the skills and systems you build for yourself have a natural way of growing. The prompt library you create for writing emails could eventually become a resource for other staff. The communication hub could evolve into a full practice-wide system. The slide deck workflow could be something you teach someone else to run.<br><br>None of that needs to happen today, next week, or even next month. This is just about keeping the door open in your mind so that as you get comfortable with these tools, you can see the bigger picture when you're ready for it.</div></div><div class=\"detail-section\"><div class=\"detail-label\">Possibilities Down the Road</div><ul class=\"talking-points\"><li>Patient communication templates that any office can use</li><li>New hire onboarding documentation that stays current with AI assistance</li><li>Automated reporting for the practice owner -- weekly numbers, summaries, trends</li><li>An internal knowledge base where staff can look up answers instead of calling you</li><li>Training materials that update themselves as policies change</li></ul></div><div class=\"context-box\"><div class=\"detail-label\">Why This Is on the List</div><div class=\"detail-text\">This is the long game. You didn't bring this up -- and you don't need to think about it now. But as someone managing multiple offices, you're in a unique position to see how these tools could scale. Mentioning it now means it's on your radar for whenever you're ready, not as something I'm pushing, but as something you'll naturally start to see the potential for as you use these tools day to day.</div></div>"}];
let statuses={},expanded={},notes={};
var currentNotesId=null;
function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);if(s){const p=JSON.parse(s);if(p.statuses){statuses=p.statuses;expanded=p.expanded||{};notes=p.notes||{}}else{statuses=p}}}catch(e){}}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({statuses,expanded,notes}));showSaved()}catch(e){}}
function showSaved(){const el=document.getElementById('saved-indicator');el.classList.add('show');setTimeout(function(){el.classList.remove('show')},1800)}
function toggleExpand(id){expanded[id]=!expanded[id];saveState();render()}
function setStatus(id,status,e){e.stopPropagation();if(statuses[id]===status){delete statuses[id]}else{statuses[id]=status}saveState();render()}
function clearAll(){if(confirm('Reset all selections?')){statuses={};expanded={};saveState();render()}}
const statusConfig=[
{key:'action',label:'Action Item',activeClass:'active-action',cardClass:'status-action'},
{key:'dig',label:'Dig Deeper',activeClass:'active-dig',cardClass:'status-dig'},
{key:'revisit',label:'Revisit Later',activeClass:'active-revisit',cardClass:'status-revisit'},
{key:'skip',label:'Not Relevant',activeClass:'active-skip',cardClass:'status-skip'}];
function render(){
const container=document.getElementById('cards-container');let currentSection='';let html='';
topics.forEach(function(topic){
if(topic.section!==currentSection){currentSection=topic.section;html+='<div class="section-label">'+currentSection+'</div>'}
const cs=statuses[topic.id];const isExp=expanded[topic.id];
const cfg=cs?statusConfig.find(function(s){return s.key===cs}):null;
const cc=cfg?cfg.cardClass:'';
let bh=statusConfig.map(function(s){const ia=cs===s.key;return'<button class="btn '+(ia?s.activeClass:'')+'" onclick="setStatus(\''+topic.id+"','"+s.key+"',event)\">"+s.label+'</button>'}).join('');
if(cs){bh+='<button class="btn btn-undo" onclick="setStatus(\''+topic.id+"','"+cs+"',event)\">Undo</button>"}
var hasNote=notes[topic.id]&&notes[topic.id].trim().length>0;
bh+='<button class="btn btn-notes'+(hasNote?' has-notes':'')+'" onclick="openNotesModal(\''+topic.id+"',event)\">"+(hasNote?'Edit Notes':'Add Notes')+'</button>';
var notePreview=hasNote?'<div class="note-preview">'+notes[topic.id].split('\n')[0].substring(0,80)+(notes[topic.id].length>80?'...':'')+'</div>':'';
html+='<div class="card '+cc+(isExp?' expanded':'')+'" id="card-'+topic.id+'">'+'<div class="card-header" onclick="toggleExpand(\''+topic.id+'\')">'+'<div class="card-top">'+'<div class="card-title-row">'+'<div class="card-title">'+topic.title+'</div>'+(topic.star?'<div class="star">YOUR IDEA</div>':'')+'</div>'+'<div class="expand-icon">&#9654;</div>'+'</div>'+'<div class="card-summary">'+topic.summary+'</div>'+'</div>'+'<div class="card-body"><div class="card-body-inner">'+topic.detail+'</div></div>'+'<div class="status-buttons">'+bh+'</div>'+notePreview+'</div>'});
container.innerHTML=html;renderSummary()}
function renderSummary(){
const groups={action:{label:'Action Items',color:'var(--action)',items:[]},dig:{label:'Dig Deeper Today',color:'var(--dig)',items:[]},revisit:{label:'Revisit Later',color:'var(--revisit)',items:[]},skip:{label:'Not Relevant',color:'var(--skip)',items:[]}};
topics.forEach(function(t){const s=statuses[t.id];if(s&&groups[s])groups[s].items.push(t)});
let html='';Object.entries(groups).forEach(function(entry){const group=entry[1];if(group.items.length===0)return;
html+='<div class="summary-group">'+'<div class="summary-group-label">'+'<div class="dot" style="background:'+group.color+'"></div>'+group.label+'</div>'+group.items.map(function(t){var noteHtml=notes[t.id]&&notes[t.id].trim()?'<div class="summary-note">'+notes[t.id].trim().replace(/\n/g,'<br>')+'</div>':'';return'<div class="summary-item">'+t.title+noteHtml+'</div>'}).join('')+'</div>'});
if(!html){html='<p class="empty-state">No items tagged yet. Work through the cards above during the session.</p>'}
document.getElementById('summary-content').innerHTML=html}
loadState();render();
document.getElementById('date-display').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function openNotesModal(id,e){
e.stopPropagation();
currentNotesId=id;
var topic=topics.find(function(t){return t.id===id});
document.getElementById('modal-title').textContent=topic.title;
document.getElementById('modal-textarea').value=notes[id]||'';
document.getElementById('notes-modal').classList.add('open');
setTimeout(function(){document.getElementById('modal-textarea').focus()},100);
}
function closeNotesModal(e){
if(e&&e.target!==document.getElementById('notes-modal'))return;
document.getElementById('notes-modal').classList.remove('open');
currentNotesId=null;
}
function saveNotes(){
var val=document.getElementById('modal-textarea').value;
if(val.trim()){notes[currentNotesId]=val.trim()}else{delete notes[currentNotesId]}
saveState();
document.getElementById('notes-modal').classList.remove('open');
currentNotesId=null;
render();
}
document.addEventListener('keydown',function(e){
if(e.key==='Escape'&&document.getElementById('notes-modal').classList.contains('open')){
document.getElementById('notes-modal').classList.remove('open');currentNotesId=null}
});

function buildSummaryText(){
var dateStr=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
var labels={action:'ACTION ITEMS -- We are doing these',dig:'DIG DEEPER -- Exploring further today',revisit:'REVISIT LATER -- For a future session',skip:'NOT RELEVANT -- Skipping for now'};
var grouped={action:[],dig:[],revisit:[],skip:[]};
topics.forEach(function(t){var s=statuses[t.id];if(s&&grouped[s])grouped[s].push(t)});
var hasAny=Object.values(grouped).some(function(arr){return arr.length>0});
if(!hasAny)return null;
var lines=[];
lines.push('AI STRATEGY SESSION -- Keilah');
lines.push(dateStr);
lines.push('');
lines.push('=========================================');
['action','dig','revisit','skip'].forEach(function(key){
var items=grouped[key];
if(items.length===0)return;
lines.push('');
lines.push(labels[key]);
lines.push('-----------------------------------------');
items.forEach(function(t){
lines.push('');
lines.push('  '+t.title+(t.star?' (YOUR IDEA)':''));
lines.push('  '+t.summary);
if(notes[t.id]&&notes[t.id].trim()){
lines.push('');
lines.push('  Notes:');
notes[t.id].trim().split('\n').forEach(function(line){lines.push('    '+line)});
}
});
lines.push('');
});
var untagged=topics.filter(function(t){return!statuses[t.id]});
if(untagged.length>0){
lines.push('NOT YET DISCUSSED');
lines.push('-----------------------------------------');
untagged.forEach(function(t){lines.push('  '+t.title)});
lines.push('');
}
lines.push('=========================================');
lines.push('View the full interactive session:');
lines.push('https://connectorofknowledge.github.io/keilah-ai-session/');
return lines.join('\n');
}

function emailSummary(){
var body=buildSummaryText();
if(!body){alert('No items tagged yet. Tag some topics first.');return}
var subject='AI Strategy Session Summary -- '+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
window.location.href='mailto:?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
}

function copySummary(){
var body=buildSummaryText();
if(!body){alert('No items tagged yet. Tag some topics first.');return}
navigator.clipboard.writeText(body).then(function(){
var btn=document.getElementById('copy-btn');
btn.textContent='Copied!';
btn.style.background='var(--action)';
btn.style.color='#000';
setTimeout(function(){btn.textContent='Copy Summary to Clipboard';btn.style.background='';btn.style.color=''},2000);
}).catch(function(){
var ta=document.createElement('textarea');
ta.value=body;ta.style.position='fixed';ta.style.opacity='0';
document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
var btn=document.getElementById('copy-btn');
btn.textContent='Copied!';
setTimeout(function(){btn.textContent='Copy Summary to Clipboard'},2000);
});
}
</script>
</body>
</html>
